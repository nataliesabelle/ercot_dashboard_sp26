dashboards:
  new_dashboard:
    title: "Generation & New Load v2"
    description: "Generation v2.0 with enhanced visuals and interactivity."
    url: "https://tempteamtexas-ueenfmgefr5wxxwkfxfywk.streamlit.app/"
    owner: "Rafael Thome"
    height: 900

  ercot_stats:
    title: "ERCOT Statistics & Analysis"
    description: "Abby's data analysis visuals rendered locally from the ercotstats_dashboard notebook assets and clean generation dataset."
    url: "https://ercot-stats-dashboard.streamlit.app"
    owner: "Abigail O'Neil"
