# ============================================================================
# ERCOT Dashboard Hub Configuration
# ============================================================================
#
# This file configures all dashboards aggregated into the hub application.
# Update these URLs when dashboards are deployed to new locations.
#
# ============================================================================

dashboards:
  generation_load:
    title: "Generation & New Load"
    description: "Rafael's Streamlit analysis of ERCOT generation capacity and new electronic loads (data centers, AI, crypto mining)."
    url: "https://ercotdashboardsp26-7trsnav9twb43kwhw9ff32.streamlit.app/"
    owner: "Rafael"
    height: 900

  ercot_stats:
    title: "ERCOT Statistics & Analysis"
    description: "Abby's data analysis visuals rendered locally from the ercotstats_dashboard notebook assets and clean generation dataset."
    url: "https://ercot-stats-dashboard.streamlit.app"
    owner: "Abby"
    height: 900

  gis_map:
    title: "Population Dynamics Map"
    description: "Population and infrastructure dynamics map embedded from an external app using the same iframe-based tab structure as the other dashboards."
    url: "https://nataliesabelle.github.io/ercot_dashboard_sp26/map_dashboard/index.html"
    owner: "GIS Team"
    height: 950

  data_centers:
    title: "Data Centers & Infrastructure (ArcGIS)"
    description: "External infrastructure map featuring data center locations, capacity, and interconnection status in ERCOT. URL read from datacenter_dashboard/arcgisonlinehttps.txt."
    url_config_file: "datacenter_dashboard/arcgisonlinehttps.txt"
    owner: "ERCOT / ArcGIS Team"
    height: 1000

